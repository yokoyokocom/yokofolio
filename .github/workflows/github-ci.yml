name: Deploy to Server

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'

    - name: Install dependencies
      run: |
        npm install

    - name: compile SCSS
      run: |
        npm run build

    - name: ssh key generate
      run: echo "$SSH_PRIVATE_KEY" > key && chmod 600 key
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Deploy to Server
      run: rsync -auzrv --delete ./themes/ yokofolio@sv77.cloudfree.ne.jp:/home/yokofolio/yokofolio.cloudfree.jp/public_html/wp-content/themes --exclude=".git/" --exclude=".github/" --exclude="node_modules/" --exclude="*.example" --exclude=".gitignore" --exclude="docker-compose.yaml" --exclude="Dockerfile" --exclude="*.json" --exclude="README.md" -e "ssh -i key -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -p 10022"